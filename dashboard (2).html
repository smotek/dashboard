<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teplota Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 24px 16px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .date-label { font-size: 12px; color: #555; }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 14px;
    padding: 14px 16px;
  }

  .card-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #f0f2f8;
  }

  .card-value span { font-size: 14px; font-weight: 400; color: #888; }

  .chart-wrap {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 14px;
    padding: 20px 16px 16px;
    margin-bottom: 20px;
  }

  .chart-title { font-size: 13px; color: #888; margin-bottom: 4px; }
  .chart-subtitle { font-size: 11px; color: #444; margin-bottom: 16px; }

  .chart-svg-wrap { width: 100%; overflow: hidden; }
  svg { width: 100%; display: block; }

  .raw-wrap {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 14px;
    padding: 14px 16px;
  }

  .raw-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .raw-text {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 11px;
    color: #4ade80;
    word-break: break-all;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <h1>🌡️ Teplota Dashboard</h1>
  <div class="date-label">24. 3. 2026 · každých 30 min</div>
</header>

<div class="cards">
  <div class="card">
    <div class="card-label">Aktuálna</div>
    <div class="card-value" id="current"></div>
  </div>
  <div class="card">
    <div class="card-label">Min</div>
    <div class="card-value" id="minVal"></div>
  </div>
  <div class="card">
    <div class="card-label">Max</div>
    <div class="card-value" id="maxVal"></div>
  </div>
</div>

<div class="chart-wrap">
  <div class="chart-title">Teplota počas dňa</div>
  <div class="chart-subtitle">48 vzoriek · interval 30 minút</div>
  <div class="chart-svg-wrap">
    <svg id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
  </div>
</div>

<div class="raw-wrap">
  <div class="raw-label">MQTT payload (simulovaný)</div>
  <div class="raw-text" id="rawMsg"></div>
</div>

<script>
const temps = [
  20.2, 19.8, 19.1, 18.5, 18.0, 17.6,
  17.2, 16.9, 16.8, 17.1, 17.8, 18.9,
  20.3, 21.8, 22.9, 23.8, 24.5, 25.1,
  25.6, 25.9, 26.1, 26.0, 25.7, 25.2,
  24.6, 23.9, 23.2, 22.5, 21.9, 21.4,
  21.0, 20.7, 20.5, 20.3, 20.1, 20.0,
  19.9, 19.8, 19.7, 19.9, 20.2, 20.5,
  20.8, 21.0, 21.1, 20.9, 20.6, 20.3
];

const W = 700, H = 260;
const padL = 44, padR = 12, padT = 16, padB = 36;
const minT = 14, maxT = 28;
const n = temps.length;

function tx(i) { return padL + (i / (n-1)) * (W - padL - padR); }
function ty(v) { return padT + (1 - (v - minT) / (maxT - minT)) * (H - padT - padB); }

const svg = document.getElementById('chart');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs, parent) {
  const e = document.createElementNS(ns, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

// grid lines y
const gridTemps = [16, 18, 20, 22, 24, 26];
for (const gt of gridTemps) {
  const y = ty(gt);
  el('line', { x1: padL, y1: y, x2: W-padR, y2: y, stroke: 'rgba(255,255,255,0.05)', 'stroke-width': 1 }, svg);
  el('text', { x: padL-6, y: y+4, fill: '#555', 'font-size': '10', 'text-anchor': 'end', 'font-family': '-apple-system,sans-serif' }, svg).textContent = gt+'°';
}

// grid lines x (every 4 hours = every 8 points)
for (let i = 0; i < n; i += 8) {
  const x = tx(i);
  el('line', { x1: x, y1: padT, x2: x, y2: H-padB, stroke: 'rgba(255,255,255,0.05)', 'stroke-width': 1 }, svg);
  const h = Math.floor(i/2).toString().padStart(2,'0');
  el('text', { x: x, y: H-padB+14, fill: '#555', 'font-size': '10', 'text-anchor': 'middle', 'font-family': '-apple-system,sans-serif' }, svg).textContent = h+':00';
}

// fill area
const areaPoints = temps.map((v,i) => tx(i)+','+ty(v)).join(' ');
const fillPath = 'M '+tx(0)+','+ty(temps[0])+' '+
  temps.map((v,i) => 'L '+tx(i)+','+ty(v)).join(' ')+
  ' L '+tx(n-1)+','+(H-padB)+' L '+tx(0)+','+(H-padB)+' Z';
el('path', { d: fillPath, fill: 'rgba(55,138,221,0.10)', stroke: 'none' }, svg);

// line
const linePath = 'M '+temps.map((v,i) => tx(i)+','+ty(v)).join(' L ');
el('path', { d: linePath, fill: 'none', stroke: '#378ADD', 'stroke-width': '2', 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }, svg);

// dots
for (let i = 0; i < n; i++) {
  el('circle', { cx: tx(i), cy: ty(temps[i]), r: '2.5', fill: '#378ADD' }, svg);
}

// cards
const cur = temps[temps.length-1];
const mn = Math.min(...temps);
const mx = Math.max(...temps);
document.getElementById('current').innerHTML = cur.toFixed(1)+'<span>°C</span>';
document.getElementById('minVal').innerHTML = mn.toFixed(1)+'<span>°C</span>';
document.getElementById('maxVal').innerHTML = mx.toFixed(1)+'<span>°C</span>';
document.getElementById('rawMsg').textContent = temps.join(';');
</script>
</body>
</html>
